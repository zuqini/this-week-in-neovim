name: site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: this-week-in-neovim

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://thisweekinneovim.org' }}

      - run: pnpm typecheck

      - uses: actions/upload-artifact@v4
        with:
          name: site-out
          path: out/
          retention-days: 14

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-out
          path: out

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main
